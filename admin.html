<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="signup-header">

<h1>MZ Luxe Admin Panel</h1>

</header>

<section class="signup-section">

<h2>Add New Product</h2>

<form id="productForm">

    <h2>Products</h2>

<div id="adminProducts"></div>

<input
type="text"
id="productName"
placeholder="Product Name"
required
>

<input
type="number"
id="productPrice"
placeholder="Price"
required
>
<input
    type="number"
    id="productRating"
    placeholder="Rating (1-5)"
    min="1"
    max="5"
    step="0.1"
    required
>
<input
type="text"
id="productImage"
placeholder="Image Path"
required
>

<!-- Gender -->

<select id="productGender" required>

    <option value="">Select Gender</option>

    <option value="Men">Men</option>

    <option value="Women">Women</option>

</select>

<!-- Category -->

<select id="productCategory" required>

    <option value="">Select Category</option>

    <!-- Men Categories -->

    <option value="Shalwar Kameez">Shalwar Kameez</option>
    <option value="Shirt">Shirt</option>
    <option value="Jeans">Jeans</option>
    <option value="Pant">Pant</option>
    <option value="Waistcoat">Waistcoat</option>

    <!-- Women Categories -->

    <option value="Lawn Suit">Lawn Suit</option>
    <option value="Kurti">Kurti</option>
    <option value="Chiffon Suit">Chiffon Suit</option>
    <option value="Linen Suit">Linen Suit</option>
    <option value="Silk Suit">Silk Suit</option>
    <option value="Organza Suit">Organza Suit</option>
    <option value="Velvet Suit">Velvet Suit</option>

</select>

<button type="submit">

Add Product

</button>

</form>

</section>

<script src="script.js"></script>

</body>

</html>
